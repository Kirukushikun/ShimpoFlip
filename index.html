<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>ShimpoFlip</title>
<link rel="icon" type="image/x-icon" href="./shimpoflip-icon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --baby: #89C4F4;
  --baby-light: #D6EEFF;
  --baby-dark: #4A90D9;
  --baby-dim: rgba(137,196,244,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 7px;
  --trans: 0.22s cubic-bezier(0.4,0,0.2,1);
}

[data-theme="light"] {
  --bg: #F4F7FB;
  --surface: #FFFFFF;
  --surface2: #F0F5FC;
  --border: #E4EDF8;
  --text: #1A2332;
  --text2: #5A6A80;
  --text3: #9AAABB;
  --sidebar-bg: #FFFFFF;
  --topbar-bg: rgba(255,255,255,0.9);
  --shadow: 0 2px 16px rgba(26,35,50,0.07);
  --shadow-lg: 0 8px 32px rgba(26,35,50,0.12);
  --active-bg: #D6EEFF;
  --active-text: #1D5FA8;
  --hover-bg: #EEF4FB;
  --input-bg: #F4F7FB;
  --overlay: rgba(26,35,50,0.45);
  --flip-back: linear-gradient(145deg,#D6EEFF,#EEF4FB);
  --success-bg: #ECFDF5; --success: #16A34A;
  --warn-bg: #FFFBEB; --warn: #D97706;
  --danger-bg: #FEF2F2; --danger: #DC2626;
}

[data-theme="dark"] {
  --bg: #0F1620;
  --surface: #18222E;
  --surface2: #1F2D3D;
  --border: #2A3A4E;
  --text: #E8EEF5;
  --text2: #8A9BB0;
  --text3: #4A5E72;
  --sidebar-bg: #131D28;
  --topbar-bg: rgba(19,29,40,0.92);
  --shadow: 0 2px 16px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --active-bg: rgba(137,196,244,0.15);
  --active-text: #89C4F4;
  --hover-bg: rgba(137,196,244,0.07);
  --input-bg: #0F1620;
  --overlay: rgba(0,0,0,0.65);
  --flip-back: linear-gradient(145deg,#1A3050,#162540);
  --success-bg: #052e16; --success: #4ADE80;
  --warn-bg: #1c1200; --warn: #FBBF24;
  --danger-bg: #1f0707; --danger: #F87171;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100%;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transition:background var(--trans),color var(--trans);
}

#app { display:flex; height:100%; overflow:hidden; }

/* SIDEBAR */
#sidebar {
  width:264px; min-width:264px;
  background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  height:100%; overflow:hidden;
  transition:background var(--trans),border-color var(--trans);
  z-index:20;
}
#sidebar-inner {
  display:flex; flex-direction:column;
  height:100%; overflow-y:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
}
.logo {
  padding:22px 18px 14px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.logo-title { font-size:20px; font-weight:700; color:var(--baby-dark); letter-spacing:-0.3px; line-height:1; }
[data-theme="dark"] .logo-title { color:var(--baby); }
.logo-sub { font-size:11px; color:var(--text3); font-weight:400; display:block; margin-top:3px; }
.logo-title span { color: var(--text); }

.theme-btn {
  width:34px; height:34px; border-radius:50%;
  border:1px solid var(--border);
  background:var(--surface2);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:16px; transition:all var(--trans); flex-shrink:0;
}
.theme-btn:hover { background:var(--active-bg); transform:scale(1.08); }

.sidebar-section { padding:14px 12px 6px; flex-shrink:0; }
.sidebar-label { font-size:10px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--text3); padding:0 6px; margin-bottom:7px; }
.sidebar-footer { margin-top:auto; padding:12px; border-top:1px solid var(--border); flex-shrink:0; }
.theme-pill { display:flex; background:var(--surface2); border-radius:99px; padding:3px; border:1px solid var(--border); gap:2px; }
.theme-seg { flex:1; padding:8px 0; border:none; border-radius:99px; background:transparent; color:var(--text2); cursor:pointer; font-size:12px; font-weight:600; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:6px; transition:all var(--trans); }
.theme-seg:hover { color:var(--text); }
.theme-seg.active { background:var(--baby); color:#fff; box-shadow:0 2px 8px rgba(137,196,244,0.35); }
[data-theme="light"] .theme-seg.active { color:var(--baby-dark); }

.btn-new-project {
  display:flex; align-items:center; gap:8px;
  width:100%; padding:10px 12px;
  background:var(--baby-dim);
  border:1.5px dashed var(--baby);
  border-radius:var(--radius-sm);
  color:var(--baby-dark);
  font-family:'Poppins',sans-serif; font-size:13px; font-weight:500;
  cursor:pointer; transition:all var(--trans);
}
[data-theme="dark"] .btn-new-project { color:var(--baby); }
.btn-new-project:hover { background:var(--baby); color:white; border-color:var(--baby); border-style:solid; }

.project-list { display:flex; flex-direction:column; gap:2px; padding-bottom:12px; }
.project-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 10px;
  border-radius:var(--radius-sm);
  cursor:pointer; transition:all var(--trans);
  border:1px solid transparent;
  font-size:13px; font-weight:400; color:var(--text2);
  user-select:none; -webkit-user-select:none;
}
.project-item:active { transform:scale(0.98); }
.project-item:hover { background:var(--hover-bg); }
.project-item.active { background:var(--active-bg); border-color:rgba(137,196,244,0.4); color:var(--active-text); font-weight:500; }

.project-icon { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
.project-info { flex:1; min-width:0; }
.project-name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:13px; }
.project-count { font-size:11px; color:var(--text3); }
.project-del { opacity:0; background:none; border:none; color:var(--danger); cursor:pointer; font-size:17px; line-height:1; padding:4px 5px; border-radius:6px; transition:opacity var(--trans); }
.project-item:hover .project-del { opacity:1; }

/* MAIN */
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

/* TOPBAR */
#topbar {
  background:var(--topbar-bg);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  display:flex; align-items:center; gap:10px;
  flex-shrink:0;
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  transition:background var(--trans),border-color var(--trans);
  z-index:10; min-height:56px;
}
#topbar h2 { font-size:16px; font-weight:600; color:var(--text); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#topbarActions { display:flex; gap:6px; flex-shrink:0; align-items:center; }

/* CONTENT */
#content {
  flex:1; overflow-y:auto; overflow-x:hidden;
  overscroll-behavior:contain; -webkit-overflow-scrolling:touch;
  padding:20px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom));
}

/* BUTTONS */
.btn {
  display:inline-flex; align-items:center; gap:5px;
  padding:8px 14px; border-radius:var(--radius-sm);
  font-family:'Poppins',sans-serif; font-size:12px; font-weight:500;
  cursor:pointer; transition:all var(--trans); border:none;
  white-space:nowrap; user-select:none; -webkit-user-select:none;
}
.btn:active { transform:scale(0.95); }
.btn-primary { background:var(--baby); color:white; }
.btn-primary:hover { background:var(--baby-dark); }
.btn-outline { background:var(--surface); border:1px solid var(--border); color:var(--text2); }
.btn-outline:hover { background:var(--hover-bg); border-color:var(--baby); color:var(--text); }
.btn-ghost { background:transparent; color:var(--text2); }
.btn-ghost:hover { background:var(--hover-bg); color:var(--text); }
.btn-icon {
  width:36px; height:36px; padding:0; border-radius:50%;
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; cursor:pointer; transition:all var(--trans);
}
.btn-icon:hover { background:var(--active-bg); }
.btn-icon:active { transform:scale(0.9); }

/* EMPTY */
.empty-state {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:60vh; gap:14px; text-align:center; padding:20px;
}
.empty-icon { font-size:52px; opacity:0.4; }
.empty-state h3 { font-size:20px; font-weight:600; color:var(--text); }
.empty-state p { font-size:14px; color:var(--text2); line-height:1.6; max-width:280px; }

/* TAG */
.tag { display:inline-flex; align-items:center; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:500; }
.tag-blue { background:var(--baby-dim); color:var(--baby-dark); }
[data-theme="dark"] .tag-blue { color:var(--baby); }

/* MODES */
.modes-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
.mode-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px 12px;
  cursor:pointer; transition:all var(--trans);
  display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center;
  box-shadow:var(--shadow); user-select:none; -webkit-user-select:none;
}
.mode-card:hover { border-color:var(--baby); background:var(--active-bg); transform:translateY(-2px); box-shadow:var(--shadow-lg); }
.mode-card:active { transform:scale(0.96); }
.mode-icon { font-size:24px; line-height:1; }
.mode-info h4 { font-size:12px; font-weight:600; color:var(--text); }
.mode-info p { font-size:10px; color:var(--text3); margin-top:1px; line-height:1.3; }

/* CARDS */
.cards-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.cards-header h3 { font-size:15px; font-weight:600; flex:1; }
.search-box {
  display:flex; align-items:center; gap:7px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:7px 11px;
  transition:border-color var(--trans);
}
.search-box:focus-within { border-color:var(--baby); }
.search-box input { border:none; outline:none; font-family:'Poppins',sans-serif; font-size:12px; color:var(--text); background:transparent; width:130px; }
.search-box input::placeholder { color:var(--text3); }

.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; margin-bottom:28px; }
.flashcard {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:16px;
  transition:all var(--trans); box-shadow:var(--shadow);
}
.flashcard:hover { box-shadow:var(--shadow-lg); border-color:var(--baby); transform:translateY(-1px); }
.flashcard-num { font-size:10px; font-weight:600; color:var(--baby-dark); letter-spacing:0.5px; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
[data-theme="dark"] .flashcard-num { color:var(--baby); }
.flashcard-q { font-weight:500; font-size:13px; color:var(--text); line-height:1.5; margin-bottom:10px; }
.flashcard-divider { height:1px; background:var(--border); margin-bottom:10px; }
.flashcard-a { font-size:12px; color:var(--text2); line-height:1.5; }
.flashcard-actions { display:flex; gap:6px; margin-top:12px; padding-top:10px; border-top:1px solid var(--border); }
.card-btn {
  flex:1; padding:6px; border-radius:var(--radius-xs);
  font-size:11px; font-weight:500; cursor:pointer;
  border:1px solid var(--border); background:var(--surface2); color:var(--text2);
  transition:all var(--trans); font-family:'Poppins',sans-serif;
}
.card-btn:hover { background:var(--hover-bg); color:var(--text); border-color:var(--baby); }
.card-btn:active { transform:scale(0.95); }
.card-btn.del:hover { background:var(--danger-bg); color:var(--danger); border-color:var(--danger); }

.sr-badge { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:20px; font-size:10px; font-weight:500; }
.sr-new { background:var(--baby-dim); color:var(--baby-dark); }
[data-theme="dark"] .sr-new { color:var(--baby); }
.sr-learning { background:var(--warn-bg); color:var(--warn); }
.sr-mastered { background:var(--success-bg); color:var(--success); }

.mastery-row { display:flex; align-items:center; gap:8px; margin:10px 0 6px; }
.mastery-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text3); flex-shrink:0; }
.mastery-pips { display:flex; gap:3px; flex:1; }
.mpip { flex:1; height:4px; border-radius:2px; background:var(--border); transition:background var(--trans); }
.mpip.on { background:var(--baby); }
.mpip.on.mastered { background:var(--success); }
.mastery-num { font-size:10px; font-weight:600; color:var(--text3); flex-shrink:0; }

.streak-widget { display:flex; flex-direction:column; gap:4px; }
.streak-row { display:flex; justify-content:space-between; align-items:center; padding:7px 10px; background:var(--surface2); border-radius:var(--radius-xs); }
.streak-icon { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px; }
.streak-val { font-size:13px; font-weight:700; color:var(--text); }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:var(--overlay);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:100; backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  animation:fadeIn 0.18s ease; padding:0;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }

.modal {
  background:var(--surface);
  border-radius:24px 24px 0 0;
  width:100%; max-width:560px; max-height:92vh;
  overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch;
  box-shadow:0 -8px 40px rgba(0,0,0,0.2);
  animation:slideUp 0.24s cubic-bezier(0.4,0,0.2,1);
  padding-bottom:calc(20px + env(safe-area-inset-bottom));
}
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 0; }
.modal-body { padding:20px 22px; }
.modal h3 { font-size:18px; font-weight:600; color:var(--text); margin-bottom:18px; }
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:11px; font-weight:600; letter-spacing:0.5px; color:var(--text2); margin-bottom:5px; text-transform:uppercase; }
.form-input,.form-textarea {
  width:100%; padding:11px 13px;
  border:1.5px solid var(--border); border-radius:var(--radius-sm);
  font-family:'Poppins',sans-serif; font-size:14px; color:var(--text);
  background:var(--input-bg); outline:none;
  transition:border-color var(--trans),background var(--trans);
  -webkit-appearance:none;
}
.form-input:focus,.form-textarea:focus { border-color:var(--baby); background:var(--surface); }
.form-textarea { resize:vertical; min-height:80px; line-height:1.5; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }

.icon-picker-wrap { margin-top:7px; }
.icon-search { width:100%; padding:8px 12px; border-radius:var(--radius-sm); border:1.5px solid var(--border); background:var(--surface2); color:var(--text); font-size:13px; font-family:inherit; outline:none; margin-bottom:8px; }
.icon-search:focus { border-color:var(--baby); }
.icon-search::placeholder { color:var(--text3); }
.icon-cats { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
.icon-cat-btn { padding:3px 11px; border-radius:20px; border:1.5px solid var(--border); background:transparent; color:var(--text2); font-size:11px; font-weight:600; cursor:pointer; transition:all var(--trans); font-family:inherit; letter-spacing:0.3px; }
.icon-cat-btn:hover { border-color:var(--baby); color:var(--baby); }
.icon-cat-btn.active { background:var(--baby); color:#fff; border-color:var(--baby); }
[data-theme="light"] .icon-cat-btn.active { color:var(--baby-dark); }
.icon-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:3px; max-height:192px; overflow-y:auto; padding:2px; scrollbar-width:thin; scrollbar-color:var(--baby) transparent; }
.icon-grid::-webkit-scrollbar { width:5px; }
.icon-grid::-webkit-scrollbar-track { background:transparent; }
.icon-grid::-webkit-scrollbar-thumb { background:var(--baby); border-radius:99px; }
.icon-grid::-webkit-scrollbar-thumb:hover { background:var(--baby-dark); }
.icon-opt { display:flex; align-items:center; justify-content:center; font-size:21px; width:34px; height:34px; border-radius:8px; cursor:pointer; border:2px solid transparent; transition:all var(--trans); }
.icon-opt:hover { background:var(--surface2); }
.icon-opt.selected { background:var(--baby-dim); border-color:var(--baby); }
.icon-opt:active { transform:scale(0.87); }
.icon-no-match { color:var(--text3); font-size:12px; padding:16px 0; text-align:center; grid-column:1/-1; }
.color-picker { display:flex; gap:8px; margin-top:7px; flex-wrap:wrap; }
.color-dot { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2.5px solid transparent; transition:all var(--trans); }
.color-dot:active { transform:scale(0.85); }
.color-dot.selected { border-color:var(--text); transform:scale(1.15); box-shadow:0 0 0 2px var(--bg); }

/* IMPORT TABS */
.tab-row { display:flex; background:var(--surface2); border-radius:var(--radius-sm); padding:3px; gap:2px; margin-bottom:16px; }
.tab-btn { flex:1; padding:8px; border-radius:7px; border:none; background:transparent; color:var(--text2); font-family:'Poppins',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:all var(--trans); }
.tab-btn.active { background:var(--surface); color:var(--text); box-shadow:var(--shadow); }

.import-zone {
  border:2px dashed var(--baby); border-radius:var(--radius-sm);
  padding:22px; text-align:center;
  background:var(--baby-dim); cursor:pointer;
  transition:all var(--trans); margin-bottom:14px;
}
.import-zone:hover { background:var(--active-bg); }
.import-zone p { font-size:13px; color:var(--text2); margin-top:6px; }
.import-zone .hint { font-size:11px; color:var(--text3); margin-top:3px; }

.import-textarea {
  width:100%; padding:11px 13px;
  border:1.5px solid var(--border); border-radius:var(--radius-sm);
  font-family:'Poppins',sans-serif; font-size:12px; color:var(--text);
  background:var(--input-bg); outline:none;
  resize:vertical; min-height:110px;
  transition:border-color var(--trans); -webkit-appearance:none;
}
.import-textarea:focus { border-color:var(--baby); }
.import-format-hint { font-size:11px; color:var(--text3); margin-top:5px; line-height:1.5; }

.ai-spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--baby); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to{transform:rotate(360deg)} }
.ai-preview-list { max-height:240px; overflow-y:auto; display:flex; flex-direction:column; gap:7px; margin-top:8px; }
.ai-preview-item { background:var(--active-bg); border:1px solid rgba(137,196,244,0.3); border-radius:var(--radius-sm); padding:11px; font-size:12px; }
.ai-preview-item strong { display:block; color:var(--text); margin-bottom:3px; font-weight:500; }
.ai-preview-item span { color:var(--text2); }

/* STUDY */
.study-screen {
  display:flex; flex-direction:column; align-items:center;
  min-height:calc(100vh - 56px);
  padding:16px 16px calc(32px + env(safe-area-inset-bottom));
}
#content.study-active {
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
#content.study-active .study-screen {
  flex:1;
  min-height:0;
  justify-content:center;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
}
@media (max-width:680px) {
  #content.study-active .study-screen { padding:10px 14px calc(10px + env(safe-area-inset-bottom)); }
}
.study-topbar { width:100%; max-width:580px; display:flex; align-items:center; gap:12px; margin-bottom:24px; }
.progress-bar-wrap { flex:1; height:5px; background:var(--border); border-radius:10px; overflow:hidden; }
.progress-bar-fill { height:100%; background:var(--baby); border-radius:10px; transition:width 0.4s ease; }
.study-counter { font-size:12px; color:var(--text3); font-weight:500; }

.flip-card-wrap {
  perspective:1000px;
  width:100%; max-width:540px; height:260px;
  cursor:pointer; margin-bottom:20px;
  user-select:none; -webkit-user-select:none;
}
.flip-card-inner {
  position:relative; width:100%; height:100%;
  transition:transform 0.48s cubic-bezier(0.4,0,0.2,1);
  transform-style:preserve-3d;
}
.flip-card-wrap.flipped .flip-card-inner { transform:rotateY(180deg); }
.flip-card-front,.flip-card-back {
  position:absolute; width:100%; height:100%;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border-radius:var(--radius); border:1.5px solid var(--border);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:28px 24px; text-align:center; box-shadow:var(--shadow-lg);
}
.flip-card-front { background:var(--surface); }
.flip-card-back { background:var(--flip-back); transform:rotateY(180deg); border-color:rgba(137,196,244,0.5); }
.flip-label { font-size:10px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--text3); margin-bottom:14px; }
.flip-card-back .flip-label { color:var(--baby); }
.flip-text { font-size:18px; font-weight:500; color:var(--text); line-height:1.45; }
.flip-card-back .flip-text { color:var(--active-text); }
[data-theme="dark"] .flip-card-back .flip-text { color:var(--baby); }
.flip-hint { font-size:11px; color:var(--text3); margin-top:16px; }

.rating-btns { display:flex; gap:10px; margin-top:4px; }
.rate-btn {
  padding:12px 20px; border-radius:var(--radius-sm); border:1.5px solid;
  font-family:'Poppins',sans-serif; font-size:13px; font-weight:500;
  cursor:pointer; transition:all var(--trans); min-width:90px;
}
.rate-btn:active { transform:scale(0.92); }
.rate-got { border-color:var(--success); color:var(--success); background:var(--success-bg); }
.rate-got:hover { background:var(--success); color:white; }
.rate-unsure { border-color:var(--warn); color:var(--warn); background:var(--warn-bg); }
.rate-unsure:hover { background:var(--warn); color:white; }
.rate-miss { border-color:var(--danger); color:var(--danger); background:var(--danger-bg); }
.rate-miss:hover { background:var(--danger); color:white; }

.quiz-question { width:100%; max-width:560px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px; margin-bottom:16px; box-shadow:var(--shadow); }
.quiz-q-label { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--baby); margin-bottom:10px; }
.quiz-q-text { font-size:17px; font-weight:500; line-height:1.45; color:var(--text); }
.quiz-options { width:100%; max-width:560px; display:flex; flex-direction:column; gap:9px; }
.quiz-option {
  padding:14px 16px; border:1.5px solid var(--border); border-radius:var(--radius-sm);
  background:var(--surface); cursor:pointer; font-size:14px; font-weight:400;
  color:var(--text); text-align:left; font-family:'Poppins',sans-serif;
  transition:all var(--trans); display:flex; align-items:center; gap:12px;
  box-shadow:var(--shadow); user-select:none; -webkit-user-select:none;
}
.quiz-option:hover:not(:disabled) { border-color:var(--baby); background:var(--active-bg); }
.quiz-option:active:not(:disabled) { transform:scale(0.98); }
.quiz-option.correct { border-color:var(--success); background:var(--success-bg); color:var(--success); font-weight:500; }
.quiz-option.wrong { border-color:var(--danger); background:var(--danger-bg); color:var(--danger); }
.option-letter { width:26px; height:26px; border-radius:50%; background:var(--surface2); color:var(--text2); font-size:11px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all var(--trans); }
.quiz-option.correct .option-letter { background:var(--success); color:white; }
.quiz-option.wrong .option-letter { background:var(--danger); color:white; }

.results-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:32px 28px;
  max-width:440px; width:100%; text-align:center;
  box-shadow:var(--shadow-lg); animation:slideUp 0.3s ease;
}
.results-score { font-size:64px; font-weight:700; color:var(--baby-dark); line-height:1; margin-bottom:6px; }
[data-theme="dark"] .results-score { color:var(--baby); }
.results-label { font-size:13px; color:var(--text3); margin-bottom:22px; }
.results-breakdown { display:flex; border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; margin-bottom:24px; }
.rb-item { flex:1; padding:14px 8px; border-right:1px solid var(--border); text-align:center; }
.rb-item:last-child { border-right:none; }
.rb-num { font-size:22px; font-weight:700; }
.rb-lbl { font-size:10px; color:var(--text3); margin-top:2px; text-transform:uppercase; letter-spacing:0.5px; }

/* PRINT PREVIEW */
.print-preview-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:10px; }
.preview-cell { aspect-ratio:3.5/2; border:1px solid var(--border); border-radius:7px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px; text-align:center; }
.preview-cell.q-cell { background:var(--surface2); }
.preview-cell.a-cell { background:var(--active-bg); }
.preview-cell-label { font-size:8px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--baby); margin-bottom:3px; }
.preview-cell-text { font-size:9px; color:var(--text); line-height:1.3; }
.preview-cell.a-cell .preview-cell-text { color:var(--active-text); }
[data-theme="dark"] .preview-cell.a-cell .preview-cell-text { color:var(--baby); }
.page-sep { display:flex; align-items:center; gap:10px; margin:10px 0; color:var(--text3); font-size:11px; }
.page-sep::before,.page-sep::after { content:''; flex:1; height:1px; background:var(--border); }
.print-tip { background:var(--active-bg); border-radius:var(--radius-sm); padding:11px; margin-top:12px; font-size:12px; color:var(--active-text); line-height:1.5; }
[data-theme="dark"] .print-tip { color:var(--baby); }

/* BOTTOM NAV */
#bottomNav {
  display:none;
  position:fixed; bottom:0; left:0; right:0;
  background:var(--topbar-bg);
  border-top:1px solid var(--border);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  z-index:50; transition:background var(--trans);
}
.bnav-items { display:flex; align-items:center; justify-content:space-around; }
.bnav-item {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 12px; border-radius:12px; cursor:pointer;
  transition:all var(--trans); min-width:56px;
  user-select:none; -webkit-user-select:none;
}
.bnav-item:active { transform:scale(0.9); }
.bnav-icon { font-size:20px; line-height:1; }
.bnav-label { font-size:10px; font-weight:500; color:var(--text3); transition:color var(--trans); }
.bnav-item.active .bnav-label { color:var(--baby-dark); }
[data-theme="dark"] .bnav-item.active .bnav-label { color:var(--baby); }

/* FAB */
#fab {
  position:fixed;
  bottom:calc(85px + env(safe-area-inset-bottom));
  right:18px; width:52px; height:52px;
  border-radius:50%; background:var(--baby); color:white;
  font-size:24px; border:none; cursor:pointer;
  box-shadow:0 4px 20px rgba(137,196,244,0.5);
  display:none; align-items:center; justify-content:center;
  transition:all var(--trans); z-index:49;
}
#fab:active { transform:scale(0.9); }
#fab:hover { background:var(--baby-dark); }

/* MOBILE DRAWER */
#mobileDrawer { display:none; position:fixed; inset:0; z-index:80; }
#drawerOverlay { position:absolute; inset:0; background:var(--overlay); backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px); }
#drawerPanel {
  position:absolute; left:0; top:0; bottom:0; width:280px;
  background:var(--sidebar-bg);
  display:flex; flex-direction:column;
  overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch;
  transform:translateX(-100%);
  transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
  box-shadow:4px 0 24px rgba(0,0,0,0.25);
}
#mobileDrawer.open { display:block; }
#mobileDrawer.open #drawerPanel { transform:translateX(0); }

/* SWIPE HINT */
.swipe-hint { font-size:11px; color:var(--text3); margin-top:10px; display:flex; align-items:center; gap:6px; }

/* TOAST */
.toast {
  position:fixed; bottom:calc(80px + env(safe-area-inset-bottom));
  left:50%; transform:translateX(-50%);
  background:var(--text); color:var(--bg);
  padding:10px 18px; border-radius:20px;
  font-size:13px; font-weight:500; z-index:999;
  white-space:nowrap; opacity:0; transition:opacity 0.2s;
  font-family:'Poppins',sans-serif; pointer-events:none;
}

/* RESPONSIVE */
@media (max-width:680px) {
  #sidebar { display:none !important; }
  #bottomNav { display:flex !important; }
  #fab { display:flex !important; }
  #content { padding:14px; padding-bottom:calc(80px + env(safe-area-inset-bottom)); }
  #topbar { padding:10px 14px; }
  #topbar h2 { font-size:15px; }
  .btn { font-size:11px; padding:7px 11px; }
  .modes-bar { gap:7px; }
  .mode-card { padding:12px 8px; }
  .mode-icon { font-size:20px; }
  .mode-info p { display:none; }
  .cards-grid { grid-template-columns:1fr; gap:10px; }
  .search-box input { width:100px; }
  .flip-card-wrap { height:230px; }
  .flip-text { font-size:16px; }
  .rating-btns { gap:7px; }
  .rate-btn { padding:10px 14px; font-size:12px; min-width:76px; }
  .quiz-q-text { font-size:15px; }
  .quiz-option { font-size:13px; padding:12px 13px; }
  .results-card { padding:24px 18px; }
  .results-score { font-size:52px; }
  .modal { border-radius:20px 20px 0 0; }
  .modal-body { padding:16px 18px; }
  .modal h3 { font-size:16px; margin-bottom:14px; }
}

@media (min-width:681px) {
  #mobileDrawer { display:none !important; }
  #fab { display:none !important; }
  .modal-overlay { align-items:center; }
  .modal { border-radius:20px; max-height:85vh; }
  .modal-handle { display:none; }
}

@media print {
  body { overflow:visible !important; }
  #sidebar,#topbar,#bottomNav,#fab,#mobileDrawer,.modes-bar,.cards-header .btn,.card-btn,.flashcard-actions,#topbarActions { display:none !important; }
  #main,#content { overflow:visible !important; height:auto !important; }
  .no-print { display: none !important; }
}

function masteryHTML(m){

function exportDeckJSON(){
  const p=activeProject();if(!p)return;
  const blob=new Blob([JSON.stringify({name:p.name,emoji:p.emoji,color:p.color,cards:p.cards},null,2)],{type:'application/json'});

  const a=document.createElement('a');a.href=url;a.download=p.name.replace(/[^a-z0-9]/gi,'_').toLowerCase()+'_cards.json';a.click();
  URL.revokeObjectURL(url);showToast('Deck exported as JSON');
}

function recordSession(){
  const today=new Date().toISOString().slice(0,10);
  let s={};try{s=JSON.parse(localStorage.getItem('cf_streak')||'{}');}catch(e){}
  if(s.date===today){s.count=(s.count||0)+1;}
  else{const prev=new Date(Date.now()-86400000).toISOString().slice(0,10);s.streak=s.date===prev?(s.streak||0)+1:1;s.date=today;s.count=1;}
  localStorage.setItem('cf_streak',JSON.stringify(s));renderStreak();
}

function renderStreak(){
  const today=new Date().toISOString().slice(0,10);
  let s={};try{s=JSON.parse(localStorage.getItem('cf_streak')||'{}');}catch(e){}

function readFile(input){
  const f=input.files[0];if(!f)return;
  if(f.name.toLowerCase().endsWith('.json')){
    const r=new FileReader();
    r.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        const cards=Array.isArray(data)?data:(data.cards||[]);
        if(!cards.length||!cards[0].q){showToast('Invalid JSON format.');return;}
        const p=activeProject();if(!p)return;
        cards.forEach(c=>p.cards.push({id:uid(),q:String(c.q),a:String(c.a),mastery:c.mastery||0,seen:c.seen||0}));
        save();closeModal();renderSidebar();renderDrawerList();renderProjectView();
        showToast(`${cards.length} cards imported`);
      }catch(err){showToast('Invalid JSON file.');}
    };r.readAsText(f);return;
  }
  const r=new FileReader();r.onload=e=>{document.getElementById('importText').value=e.target.result;};r.readAsText(f);
}
function importText(){
  const raw=document.getElementById('importText').value.trim();if(!raw)return;
  const cards=parseImportText(raw);if(!cards.length){showToast('No cards found. Check format.');return;}
  const p=activeProject();cards.forEach(c=>p.cards.push({id:uid(),q:c.q,a:c.a,mastery:0,seen:0}));
  save();closeModal();renderSidebar();renderDrawerList();renderProjectView();showToast(`${cards.length} cards imported ✓`);
}
function parseImportText(text){
  const cards=[];
  if(text.includes(',')&&!text.toLowerCase().includes('q:')){
    text.split('\n').forEach(line=>{const parts=line.split(',');if(parts.length>=2){const q=parts[0].trim().replace(/^"|"$/g,'');const a=parts.slice(1).join(',').trim().replace(/^"|"$/g,'');if(q&&a)cards.push({q,a});}});
    return cards;
  }
  const blocks=text.split(/\n\s*\n/);
  blocks.forEach(block=>{const qm=block.match(/Q:\s*(.+)/i);const am=block.match(/A:\s*(.+)/i);if(qm&&am)cards.push({q:qm[1].trim(),a:am[1].trim()});});
  if(!cards.length){const lines=text.split('\n');let q=null;lines.forEach(line=>{if(line.match(/^Q:/i))q=line.replace(/^Q:/i,'').trim();else if(line.match(/^A:/i)&&q){cards.push({q,a:line.replace(/^A:/i,'').trim()});q=null;}});}
  return cards;
}
async function generateWithAI(){
  const notes=document.getElementById('aiNotes').value.trim();const apiKey=document.getElementById('apiKeyInput').value.trim();
  if(!notes){showToast('Paste study material first.');return;}if(!apiKey){showToast('Enter API key.');return;}
  state.apiKey=apiKey;localStorage.setItem('cf_apikey',apiKey);
  const status=document.getElementById('aiStatus');
  status.innerHTML=`<div style="text-align:center;padding:20px;"><div class="ai-spinner"></div><p style="color:var(--text2);font-size:13px;">Generating cards...</p></div>`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:`Extract key concepts from these notes as flashcard pairs. Return ONLY a JSON array, no markdown. Format: [{"q":"question","a":"answer"},...]\n\nNotes:\n${notes}`}]})});
    const data=await res.json();if(data.error)throw new Error(data.error.message);
    const cards=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    status.innerHTML=`<div style="margin-bottom:10px;font-size:12px;color:var(--text2);"><i class="fa-solid fa-wand-magic-sparkles"></i> ${cards.length} cards generated:</div><div class="ai-preview-list">${cards.map(c=>`<div class="ai-preview-item"><strong>Q: ${escHtml(c.q)}</strong><span>A: ${escHtml(c.a)}</span></div>`).join('')}</div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick='importAICards(${JSON.stringify(cards).replace(/'/g,"&#39;")})'>Add ${cards.length} Cards</button></div>`;
  }catch(err){status.innerHTML=`<div style="color:var(--danger);font-size:12px;padding:10px;background:var(--danger-bg);border-radius:8px;">Error: ${escHtml(err.message)}</div>`;}
}
function importAICards(cards){const p=activeProject();cards.forEach(c=>p.cards.push({id:uid(),q:c.q,a:c.a,mastery:0,seen:0}));save();closeModal();renderSidebar();renderDrawerList();renderProjectView();showToast(`${cards.length} cards imported ✓`);}

function openPrintPreview(){
  const p=activeProject();if(!p||!p.cards.length){showToast('No cards to print.');return;}
  let qCells='',aCells='';
  p.cards.forEach((c,i)=>{
    qCells+=`<div class="preview-cell q-cell"><div class="preview-cell-label">Q${i+1}</div><div class="preview-cell-text">${escHtml(c.q.slice(0,70))}${c.q.length>70?'…':''}</div></div>`;
    aCells+=`<div class="preview-cell a-cell"><div class="preview-cell-label">A${i+1}</div><div class="preview-cell-text">${escHtml(c.a.slice(0,70))}${c.a.length>70?'…':''}</div></div>`;
  });
  const rem=p.cards.length%3;
  if(rem){for(let i=0;i<3-rem;i++){qCells+=`<div class="preview-cell"></div>`;aCells+=`<div class="preview-cell"></div>`;}}
  showModal(`<div class="modal"><div class="modal-handle"></div><div class="modal-body"><h3><i class="fa-solid fa-print"></i> Print Preview</h3><p style="font-size:12px;color:var(--text2);margin-bottom:14px;">Print double-sided (flip on short edge). Each answer lands directly behind its question — no manual mirroring needed.</p><div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Page 1 — Questions</div><div class="print-preview-grid">${qCells}</div><div class="page-sep">↕ flip on short edge</div><div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Page 2 — Answers</div><div class="print-preview-grid">${aCells}</div><div class="print-tip"><i class="fa-solid fa-lightbulb"></i> Enable "two-sided" in print settings, flip on short edge. Cut along the grid lines.</div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Close</button><button class="btn btn-primary" onclick="doPrint()">Print Now</button></div></div></div>`);
}
function doPrint(){
  const p=activeProject();const pw=window.open('','_blank');
  let qRows='',aRows='';const rows=Math.ceil(p.cards.length/3);
  for(let row=0;row<rows;row++){
    let qCells='',aCells='';
    for(let col=0;col<3;col++){
      const c=p.cards[row*3+col];const idx=row*3+col;
      qCells+=c?`<div class="cell"><div class="cell-label">Q${idx+1}</div><div class="cell-text">${escHtml(c.q)}</div></div>`:`<div class="cell empty"></div>`;
      aCells+=c?`<div class="cell answer"><div class="cell-label">A${idx+1}</div><div class="cell-text">${escHtml(c.a)}</div></div>`:`<div class="cell empty"></div>`;
    }
    qRows+=`<div class="grid-row">${qCells}</div>`;
    aRows+=`<div class="grid-row">${aCells}</div>`;
  }
  pw.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${p.name} — ShimpoFlip</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Poppins',sans-serif;background:white;}.page-header{text-align:center;padding:12px;font-size:11px;color:#94A3B8;border-bottom:1px solid #E2EBF5;}.page-header strong{color:#334155;font-size:13px;display:block;margin-bottom:2px;}.grid-row{display:grid;grid-template-columns:repeat(3,1fr);}.cell{border:1px solid #CBD5E1;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center;}.cell.answer{background:#EFF6FF;}.cell.empty{background:#F8FAFC;border:1px dashed #E2E8F0;}.cell-label{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#89C4F4;margin-bottom:8px;}.cell-text{font-size:12px;color:#1E293B;line-height:1.45;}.cell.answer .cell-text{color:#1D4ED8;}.page-break{page-break-before:always;}.no-print{background:#EFF6FF;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}</style></head><body><div class="no-print" id="noPrint"><span style="font-size:13px;color:#1D4ED8;font-weight:500;">📋 ${escHtml(p.name)} — Enable two-sided printing, flip on short edge</span><button onclick="window.print()" style="background:#89C4F4;border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;">Print</button></div><div class="page-header"><strong>${escHtml(p.name)}</strong>Page 1 — Questions · ${p.cards.length} cards</div>${qRows}<div class="page-break"></div><div class="page-header"><strong>${escHtml(p.name)}</strong>Page 2 — Answers · two-sided, flip on short edge</div>${aRows}<script>var _nb=document.getElementById('noPrint');window.addEventListener('beforeprint',function(){if(_nb)_nb.style.display='none';});window.addEventListener('afterprint',function(){if(_nb)_nb.style.display='';});<\/script></body></html>`);
  pw.document.close();pw.focus();setTimeout(()=>pw.print(),600);
}

let studyState={};
let touchStartX=0;

function enterStudy(){
  document.getElementById('content').classList.add('study-active');
  const pv=document.getElementById('projectView');
  pv.style.cssText='display:flex;flex-direction:column;flex:1;min-height:0;';
  const fab=document.getElementById('fab');if(fab)fab.style.setProperty('display','none','important');
}

function startFlipMode(){
  const p=activeProject();if(!p||!p.cards.length)return;
  const shuffled=[...p.cards].sort(()=>Math.random()-0.5);
  studyState={cards:shuffled,idx:0,correct:0,unsure:0,miss:0,mode:'flip'};
  enterStudy();renderFlip();
}

function renderFlip(){
  const ss=studyState;const c=ss.cards[ss.idx];const pct=Math.round((ss.idx/ss.cards.length)*100);
  document.getElementById('topbarTitle').innerHTML=ss.mode==='spaced'?'<i class="fa-solid fa-brain"></i> Spaced Rep':'<i class="fa-solid fa-rotate"></i> Flip Cards';
  document.getElementById('topbarActions').innerHTML=`<button class="btn btn-outline" onclick="exitStudy()"><i class="fa-solid fa-xmark"></i> Exit</button>`;
  document.getElementById('projectView').innerHTML=`
    <div class="study-screen" id="studyScreen">
      <div class="study-topbar"><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div class="study-counter">${ss.idx+1} / ${ss.cards.length}</div></div>
      <div class="flip-card-wrap" id="flipCard" onclick="flipCard()">
        <div class="flip-card-inner">
          <div class="flip-card-front"><div class="flip-label">Question</div><div class="flip-text">${escHtml(c.q)}</div><div class="flip-hint">Tap to reveal answer</div></div>
          <div class="flip-card-back"><div class="flip-label">Answer</div><div class="flip-text">${escHtml(c.a)}</div></div>
        </div>
      </div>
      <div id="ratingBtns" style="display:none;" class="rating-btns">
        <button class="rate-btn rate-got" onclick="rateCard('got')"><i class="fa-solid fa-check"></i> Got it</button>
        <button class="rate-btn rate-unsure" onclick="rateCard('unsure')"><i class="fa-solid fa-question"></i> Unsure</button>
        <button class="rate-btn rate-miss" onclick="rateCard('miss')"><i class="fa-solid fa-xmark"></i> Missed</button>
      </div>
      <div class="swipe-hint" id="flipNote"><i class="fa-solid fa-hand-point-up"></i> Tap to flip &nbsp;·&nbsp; Space</div>
    </div>
  `;
  // Touch swipe for rating
  const screen=document.getElementById('studyScreen');
  screen.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
  screen.addEventListener('touchend',e=>{
    if(!document.getElementById('flipCard')?.classList.contains('flipped'))return;
    const dx=e.changedTouches[0].clientX-touchStartX;
    if(Math.abs(dx)>55){dx>0?rateCard('got'):rateCard('miss');}
  },{passive:true});
}

function flipCard(){
  const card=document.getElementById('flipCard');card.classList.toggle('flipped');
  const isFlipped=card.classList.contains('flipped');
  document.getElementById('ratingBtns').style.display=isFlipped?'flex':'none';
  const note=document.getElementById('flipNote');
  if(note)note.innerHTML=isFlipped?'<i class="fa-solid fa-hand-point-left"></i> Swipe · or arrow keys to rate':'<i class="fa-solid fa-hand-point-up"></i> Tap to flip &nbsp;·&nbsp; Space';
}

function rateCard(rating){
  const ss=studyState;const c=ss.cards[ss.idx];
  const pc=activeProject().cards.find(x=>x.id===c.id);
  if(pc){if(rating==='got'){pc.mastery=Math.min(pc.mastery+1,5);ss.correct++;}else if(rating==='unsure'){ss.unsure++;}else{pc.mastery=Math.max(0,pc.mastery-1);ss.miss++;}}
  save();ss.idx++;
  if(ss.idx>=ss.cards.length)renderStudyResults();else renderFlip();
}

function startQuizMode(){
  const p=activeProject();if(!p||p.cards.length<2){showToast('Need at least 2 cards.');return;}
  const shuffled=[...p.cards].sort(()=>Math.random()-0.5);
  studyState={cards:shuffled,idx:0,correct:0,miss:0,mode:'quiz'};
  enterStudy();renderQuiz();
}

function renderQuiz(){
  const ss=studyState;const c=ss.cards[ss.idx];const pct=Math.round((ss.idx/ss.cards.length)*100);const p=activeProject();
  const others=p.cards.filter(x=>x.id!==c.id).map(x=>x.a);
  const wrong=others.sort(()=>Math.random()-0.5).slice(0,3);
  const options=[c.a,...wrong].sort(()=>Math.random()-0.5);
  const letters=['A','B','C','D'];
  document.getElementById('topbarTitle').innerHTML='<i class="fa-solid fa-list-check"></i> Quiz';
  document.getElementById('topbarActions').innerHTML=`<button class="btn btn-outline" onclick="exitStudy()"><i class="fa-solid fa-xmark"></i> Exit</button>`;
  document.getElementById('projectView').innerHTML=`
    <div class="study-screen">
      <div class="study-topbar"><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div class="study-counter">${ss.idx+1} / ${ss.cards.length}</div></div>
      <div class="quiz-question"><div class="quiz-q-label">Question ${ss.idx+1}</div><div class="quiz-q-text">${escHtml(c.q)}</div></div>
      <div class="quiz-options">${options.map((opt,i)=>`<button class="quiz-option" data-opt="${escHtml(opt)}" onclick="answerQuiz(this)"><div class="option-letter">${letters[i]}</div>${escHtml(opt)}</button>`).join('')}</div>
      <div class="swipe-hint" style="margin-top:12px;"><i class="fa-solid fa-keyboard"></i> Press 1–4 or A–D to answer</div>
    </div>
  `;
}

function answerQuiz(btn){
  const chosen=btn.dataset.opt;const correct=studyState.cards[studyState.idx].a;
  document.querySelectorAll('.quiz-option').forEach(b=>{b.disabled=true;if(b.dataset.opt===correct)b.classList.add('correct');});
  if(chosen===correct){btn.classList.add('correct');studyState.correct++;const pc=activeProject().cards.find(x=>x.q===studyState.cards[studyState.idx].q);if(pc){pc.mastery=Math.min(pc.mastery+1,5);save();}}
  else{btn.classList.add('wrong');studyState.miss++;const pc=activeProject().cards.find(x=>x.q===studyState.cards[studyState.idx].q);if(pc){pc.mastery=Math.max(0,pc.mastery-1);save();}}
  const screen=document.querySelector('.study-screen');
  const nb=document.createElement('button');
  nb.id='quizNextBtn';nb.className='btn btn-primary';nb.style.cssText='margin-top:16px;min-width:130px;font-size:14px;padding:11px 24px;';
  nb.innerHTML=studyState.idx+1<studyState.cards.length?'Next <i class="fa-solid fa-arrow-right"></i>':'See Results';
  nb.onclick=()=>{studyState.idx++;if(studyState.idx>=studyState.cards.length)renderStudyResults();else renderQuiz();};
  screen.appendChild(nb);
}

function startSpacedMode(){
  const p=activeProject();if(!p||!p.cards.length)return;
  const sorted=[...p.cards].sort((a,b)=>a.mastery-b.mastery);
  const pool=[];sorted.forEach(c=>{const t=Math.max(1,4-c.mastery);for(let i=0;i<t;i++)pool.push(c);});
  pool.sort(()=>Math.random()-0.5);
  studyState={cards:pool.slice(0,Math.min(pool.length,20)),idx:0,correct:0,unsure:0,miss:0,mode:'spaced'};
  enterStudy();renderFlip();
}

function renderStudyResults(){
  recordSession();
  const ss=studyState;const total=ss.cards.length;
  const score=Math.round((ss.correct/total)*100);
  const resIcon=score>=80?'<i class="fa-solid fa-trophy" style="color:var(--baby);"></i>':score>=60?'<i class="fa-solid fa-thumbs-up" style="color:var(--success);"></i>':'<i class="fa-solid fa-book-open" style="color:var(--text2);"></i>';
  document.getElementById('topbarTitle').innerHTML='Results';
  document.getElementById('topbarActions').innerHTML='';
  document.getElementById('projectView').innerHTML=`
    <div class="study-screen">
      <div class="results-card">
        <div style="font-size:44px;margin-bottom:8px;">${resIcon}</div>
        <div class="results-score">${score}%</div>
        <div class="results-label">Session complete · ${total} cards reviewed</div>
        <div class="results-breakdown">
          <div class="rb-item"><div class="rb-num" style="color:var(--success);">${ss.correct}</div><div class="rb-lbl">Got it</div></div>
          <div class="rb-item"><div class="rb-num" style="color:var(--warn);">${ss.unsure||0}</div><div class="rb-lbl">Unsure</div></div>
          <div class="rb-item"><div class="rb-num" style="color:var(--danger);">${ss.miss}</div><div class="rb-lbl">Missed</div></div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-outline" style="flex:1;" onclick="${ss.mode==='quiz'?'startQuizMode()':ss.mode==='spaced'?'startSpacedMode()':'startFlipMode()'}">Retry</button>
          <button class="btn btn-primary" style="flex:1;" onclick="exitStudy()">Back to Deck</button>
        </div>
      </div>
    </div>
  `;
}

function exitStudy(){
  studyState={};
  document.getElementById('content').classList.remove('study-active');
  const fab=document.getElementById('fab');if(fab)fab.style.removeProperty('display');
  const p=activeProject();
  if(p)renderProjectView();
  else{document.getElementById('emptyState').style.display='';document.getElementById('projectView').style.display='none';}
}

function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  const m=studyState.mode;
  if(m==='flip'||m==='spaced'){
    const fc=document.getElementById('flipCard');if(!fc)return;
    const flipped=fc.classList.contains('flipped');
    if((e.code==='Space'||e.code==='Enter')&&!flipped){e.preventDefault();flipCard();}
    else if(flipped){
      if(e.key==='ArrowRight'||e.key.toLowerCase()==='g'){e.preventDefault();rateCard('got');}
      else if(e.key==='ArrowDown'||e.key.toLowerCase()==='u'){e.preventDefault();rateCard('unsure');}
      else if(e.key==='ArrowLeft'||e.key.toLowerCase()==='x'){e.preventDefault();rateCard('miss');}
    }
  }else if(m==='quiz'){
    const opts=document.querySelectorAll('.quiz-option:not([disabled])');
    if(opts.length===0){if(e.code==='Space'||e.code==='Enter'){const nb=document.getElementById('quizNextBtn');if(nb)nb.click();}}
    else{const map={'1':0,'2':1,'3':2,'4':3};const k=e.key.toLowerCase();const ai=k.charCodeAt(0)-97;const i=map[e.key]!==undefined?map[e.key]:(ai>=0&&ai<=3?ai:-1);if(i>=0&&opts[i])opts[i].click();}
  }
});

load();applyTheme(state.theme);renderSidebar();checkMobile();renderStreak();
window.addEventListener('resize',checkMobile);
if(state.projects.length>0)selectProject(state.projects[0].id);
</script>
